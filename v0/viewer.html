<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(10, 25px);
      gap: 4px;
    }
    .cell {
      width: 25px;
      height: 25px;
      background: #111;
    }
    .alive {
      background: white;
    }
  </style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
  const grid = document.getElementById("grid");
  const cells = [];

  for (let i = 0; i < 100; i++) {
    const d = document.createElement("div");
    d.className = "cell";
    grid.appendChild(d);
    cells.push(d);
  }

  const ws = new WebSocket("ws://localhost:8080");

  ws.onmessage = e => {
    const alive = JSON.parse(e.data);
    cells.forEach((c, i) =>
      c.classList.toggle("alive", alive.includes(i))
    );
  };
</script>

</body>
</html>
