<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P2P v7</title>

  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #9a9a9a;
      --cell: #101010;
      --cell-size: 40px;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: monospace;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid #1a1a1a;
    }

    .logo {
      width: 80px;
      height: 55px;
    }

    button {
      padding: 10px 14px;
      border: 2px solid var(--fg);
      background: transparent;
      color: var(--fg);
      cursor: pointer;
      font-family: monospace;
    }

    button:hover:enabled {
      background: var(--fg);
      color: var(--bg);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .content {
      margin-top: 96px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-bottom: 32px;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      max-width: 840px;
      padding: 0 12px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, var(--cell-size));
      gap: 0;
      border: 1px solid #1f1f1f;
      line-height: 0;
      font-size: 0;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      background: var(--cell);
      position: relative;
      overflow: hidden;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: none;
      image-rendering: pixelated;
    }

    .wallets {
      color: #b5b5b5;
      font-size: 13px;
      max-width: 840px;
      text-align: center;
      padding: 0 12px;
      word-break: break-word;
    }

    #seeder {
      display: none;
      gap: 10px;
    }

    .sim-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
      border: 1px solid #2a2a2a;
      padding: 12px;
      width: min(840px, calc(100% - 24px));
    }

    .sim-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    .sim-panel input {
      width: 88px;
      padding: 8px;
      background: #000;
      color: #fff;
      border: 1px solid #444;
      font-family: monospace;
    }

    .sim-label {
      color: #9f9f9f;
      font-size: 13px;
    }

    @media (max-width: 680px) {
      :root {
        --cell-size: 32px;
      }

      .navbar {
        padding: 0 12px;
      }

      .logo {
        width: 66px;
        height: 46px;
      }
    }
  </style>
</head>

<body>
  <div class="navbar">
    <img src="/logo.svg" class="logo" />
    <button id="connect">Connect</button>
  </div>

  <div class="content">
    <div id="status" class="meta">Loading round state...</div>
    <div id="metrics" class="meta"></div>
    <div class="grid" id="grid"></div>
    <button id="mint" style="display:none">Mint Pixel</button>
    <div id="seeder"></div>
    <div id="sim-panel" class="sim-panel">
      <div class="sim-label">Testing Mode Controls</div>
      <div class="sim-row">
        <label class="sim-label" for="sim-minted">minted</label>
        <input id="sim-minted" type="number" min="0" max="100" value="100" />
        <label class="sim-label" for="sim-seeded">seeded</label>
        <input id="sim-seeded" type="number" min="0" max="100" value="0" />
        <button id="sim-apply" type="button">Apply</button>
        <button id="sim-all" type="button">100/100</button>
        <button id="sim-clear" type="button">Seed 0</button>
      </div>
    </div>
    <div id="wallets" class="wallets"></div>
  </div>

  <script src="/ethers.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
