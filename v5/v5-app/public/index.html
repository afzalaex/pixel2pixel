<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>P2P v5</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
}
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px;
  background: black;
}
.logo { width: 80px; height: 55px; }
button {
  padding: 10px 14px;
  border: 2px solid #fff;
  background: transparent;
  color: #fff;
  cursor: pointer;
}
button:hover { background: #fff; color: #000; }
.content {
  margin-top: 96px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(10, 40px);
}
.cell {
  width: 40px;
  height: 40px;
  background: #111;
}
.meta { color: #777; font-size: 14px; }
.wallets { color: #aaa; font-size: 13px; max-width: 420px; text-align: center; }
.seeder {
  display: flex;
  gap: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <img src="/logo.svg" class="logo" />
  <button id="connect">Connect</button>
</div>

<div class="content">
  <div id="status" class="meta">Connect wallet to participate</div>
  <div id="metrics" class="meta"></div>
  <div class="grid" id="grid"></div>
  <button id="mint" style="display:none">Mint Pixel</button>
  <div id="seeder" style="display:none; gap:10px"></div>
  <div id="wallets" class="meta"></div>
</div>

<script src="/ethers.min.js"></script>
<script src="/app.js"></script>

</body>
</html>
